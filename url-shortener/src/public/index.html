<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shwty — сокращатель ссылок</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <style>
    body 
    {
      transition: none;
    }
    .glass 
    {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
    }
    .slider-track 
    {
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 9999px;
      position: relative;
      top: 20px;
      cursor: pointer;
    }
    .slider-thumb 
    {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      user-select: none;
    }
    .slider-thumb:active 
    {
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      cursor: grabbing;
    }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-lg mx-auto pt-12 px-6">
    
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-bold tracking-tight">shwty</h1>
        <p class="text-slate-400">Сокращай. Делись.</p>
      </div>
    </div>

    <div class="mb-10">
      <p class="text-slate-400 text-sm mb-3">Настроение</p>
      <div class="slider-container relative h-12">
        <div class="slider-track w-full" id="sliderTrack"></div>
        <div class="slider-thumb" id="sliderThumb"></div>
      </div>
    </div>

    <div class="glass rounded-3xl shadow-2xl border border-white/10 p-8">
      <form id="shortenForm" class="space-y-6">
        <div>
          <label class="block text-sm text-slate-400 mb-2">Длинная ссылка</label>
          <input 
            type="url" 
            id="longUrl" 
            placeholder="https://youtube.com/watch?v=..." 
            required
            class="w-full bg-slate-900 border border-slate-700 focus:border-blue-500 rounded-2xl px-5 py-4 text-lg outline-none transition-colors">
        </div>

        <button 
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 transition-all font-semibold text-lg py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-[0.985]">
          <i class="fas fa-link"></i>
          Сократить ссылку
        </button>
      </form>

      <div id="result" class="hidden mt-8 pt-6 border-t border-slate-700"></div>
    </div>

    <div class="glass mt-8 rounded-3xl p-5 text-center border border-white/10">
      <p class="text-slate-300 font-medium">made by Naknad.</p>
    </div>

  </div>

  <script>
    const themes = 
    [
      { name: "cyber",   gradient: "linear-gradient(135deg, #0f172a, #1e3a8a, #3b82f6)" },
      { name: "neon",    gradient: "linear-gradient(135deg, #0f172a, #7e22ce, #ec4899)" },
      { name: "aurora",  gradient: "linear-gradient(135deg, #0f172a, #10b981, #22d3ee)" },
      { name: "sunset",  gradient: "linear-gradient(135deg, #0f172a, #f97316, #ef4444)" },
      { name: "void",    gradient: "linear-gradient(135deg, #020617, #1e2937, #334155)" },
      { name: "emerald", gradient: "linear-gradient(135deg, #0f172a, #10b981, #34d399)" },
      { name: "violet",  gradient: "linear-gradient(135deg, #0f172a, #6b21a8, #a855f7)" }
    ];

    let currentProgress = 0.3;

    function hexToRgb(hex) 
    {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return [r, g, b];
    }

    function rgbToHex(r, g, b) 
    {
      return "#" + [r,g,b].map(x => Math.round(x).toString(16).padStart(2,'0')).join('');
    }

    function lerpColor(startHex, endHex, t) 
    {
      const s = hexToRgb(startHex);
      const e = hexToRgb(endHex);
      const r = Math.round(s[0] + (e[0] - s[0]) * t);
      const g = Math.round(s[1] + (e[1] - s[1]) * t);
      const b = Math.round(s[2] + (e[2] - s[2]) * t);
      return rgbToHex(r, g, b);
    }

    function getInterpolatedGradient(progress) 
    {
      const max = themes.length - 1;
      let index = Math.floor(progress * max);
      let t = (progress * max) - index;

      if (index >= max) {
        index = max - 1;
        t = 1;
      }

      const start = themes[index];
      const end = themes[index + 1];

      // Извлекаем цвета
      const sColors = start.gradient.match(/#[0-9a-fA-F]{6}/g);
      const eColors = end.gradient.match(/#[0-9a-fA-F]{6}/g);

      const c1 = lerpColor(sColors[0], eColors[0], t);
      const c2 = lerpColor(sColors[1], eColors[1], t);
      const c3 = lerpColor(sColors[2], eColors[2], t);

      return `linear-gradient(135deg, ${c1}, ${c2}, ${c3})`;
    }

    function updateBackground(progress)
    {
      const newGradient = getInterpolatedGradient(progress);
      
      gsap.to("body", {
        background: newGradient,
        duration: 0.65,
        ease: "power2.out"
      });
    }

    function updateSlider()
    {
      gsap.to("#sliderThumb", {
        left: `${currentProgress * 100}%`,
        duration: 0.1,
        ease: "none"
      });
    }

    function initSlider()
    {
      const thumb = document.getElementById('sliderThumb');
      const track = document.getElementById('sliderTrack');
      let isDragging = false;

      function handleMove(clientX)
      {
        const rect = track.getBoundingClientRect();
        let progress = (clientX - rect.left) / rect.width;
        progress = Math.max(0, Math.min(1, progress));

        currentProgress = progress;
        updateBackground(progress);
        updateSlider();
      }

      thumb.addEventListener('mousedown', () => isDragging = true);
      document.addEventListener('mouseup', () => isDragging = false);
      document.addEventListener('mousemove', (e) => { if (isDragging) handleMove(e.clientX); });

      thumb.addEventListener('touchstart', () => isDragging = true);
      document.addEventListener('touchend', () => isDragging = false);
      document.addEventListener('touchmove', (e) => { if (isDragging) handleMove(e.touches[0].clientX); });

      track.addEventListener('click', (e) => handleMove(e.clientX));
    }

    // Форма
    document.getElementById('shortenForm').addEventListener('submit', async (e) => 
    {
      e.preventDefault();
      const longUrl = document.getElementById('longUrl').value.trim();
      const resultDiv = document.getElementById('result');
      resultDiv.classList.add('hidden');

      try 
      {
        const response = await fetch('/shorten', 
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ longUrl })
        });

        const data = await response.json();

        if (data.shortUrl) 
        {
          resultDiv.innerHTML = `
            <div class="bg-slate-900/80 rounded-2xl p-5 border border-slate-700">
              <p class="text-emerald-400 text-sm mb-2">Готово ✅</p>
              <a href="${data.shortUrl}" target="_blank" class="block text-blue-400 hover:text-blue-300 break-all text-lg font-medium mb-4">
                ${data.shortUrl}
              </a>
              <button onclick="copyToClipboard('${data.shortUrl}')" 
                      class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl transition-colors flex items-center gap-2">
                <i class="fas fa-copy"></i> Копировать
              </button>
            </div>
          `;
          resultDiv.classList.remove('hidden');
        } 
        else 
        {
          resultDiv.innerHTML = `<div class="text-red-400 bg-red-950/50 p-4 rounded-2xl">Ошибка: ${data.error || 'Что-то пошло не так'}</div>`;
          resultDiv.classList.remove('hidden');
        }
      } 
      catch (err) 
      {
        resultDiv.innerHTML = `<div class="text-red-400 bg-red-950/50 p-4 rounded-2xl">Не удалось связаться с сервером</div>`;
        resultDiv.classList.remove('hidden');
      }
    });

    function copyToClipboard(text)
    {
      navigator.clipboard.writeText(text).then(() => 
      {
        const btn = event.currentTarget;
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Скопировано!';
        btn.disabled = true;
        setTimeout(() => 
        {
          btn.innerHTML = original;
          btn.disabled = false;
        }, 2000);
      });
    }

    // Инициализация
    initSlider();

    const savedTheme = localStorage.getItem('shwtyTheme');
    if (savedTheme)
    {
      const idx = themes.findIndex(t => t.name === savedTheme);
      currentProgress = idx !== -1 ? idx / (themes.length - 1) : 0.3;
    }

    updateBackground(currentProgress);
    updateSlider();
  </script>
</body>
</html>
